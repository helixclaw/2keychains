pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: '*.{ts,tsx}'
      run: npm run build
    lint:
      glob: '*.{ts,tsx,js,json,md}'
      run: npm run lint
    coverage:
      glob: '*.{ts,tsx}'
      run: npm run test:coverage
    test:
      glob: '*.{ts,tsx}'
      run: npm run test
